---
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  labels:
    app.kubernetes.io/name: dragonfly
    app.kubernetes.io/instance: dragonfly
    app.kubernetes.io/part-of: dragonfly-operator
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: dragonfly-operator
  name: dragonfly
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.14.6@sha256:10b3e4eb7adebecc04a5e10bacef6a478911ed4bda670e3af64300054aaa453f
  replicas: 3
  args:
    - '--proactor_threads=2'
#    - '--hz=1'
  resources:
    requests:
      cpu: 20m
      memory: 2048Mi
    limits:
      memory: 4096Mi
