apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: qbittools-tags-networkpolicy
  namespace: downloads
spec:
  endpointSelector:
    matchLabels:
      name: qbittools-tags
  ingress:
    - {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            name: qbittorrent
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
