---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./pvc.yaml
#  - ./helmrelease.yaml
  - ./volsync.yaml
  - ./recyclarr-volsync-restore.yaml
configMapGenerator:
  - name: recyclarr-configmap
    files:
      - config/recyclarr.yml
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
