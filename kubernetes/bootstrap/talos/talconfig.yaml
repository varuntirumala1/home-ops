# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.6.5
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.29.2

clusterName: &cluster home-kubernetes
endpoint: https://192.168.115.100:6443
clusterPodNets:
  - "10.42.0.0/16"
clusterSvcNets:
  - "10.43.0.0/16"
additionalApiServerCertSans: &sans
  - "192.168.115.100"
  - 127.0.0.1 # KubePrism
  - "api.k8s.achva.network"
additionalMachineCertSans: *sans
cniConfig:
  name: none

nodes:
  - hostname: "talos-cp01"
    ipAddress: "192.168.112.41"
    installDiskSelector:
      serial: "talos-cp01-disk0"
    talosImageURL: factory.talos.dev/installer/22a73b21ea2e27057f17a22b56fdf89e09868979c10d22f10a9b7e9c1e988a60
    controlPlane: true
    networkInterfaces:
      - interface: eth0
        dhcp: false
        addresses:
          - "192.168.112.41/22"
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.115.254"
        vip:
          ip: "192.168.115.100"
  - hostname: "talos-cp02"
    ipAddress: "192.168.112.42"
    installDiskSelector:
      serial: "talos-cp02-disk0"
    talosImageURL: factory.talos.dev/installer/22a73b21ea2e27057f17a22b56fdf89e09868979c10d22f10a9b7e9c1e988a60
    controlPlane: true
    networkInterfaces:
      - interface: eth0
        dhcp: false
        addresses:
          - "192.168.112.42/22"
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.115.254"
        vip:
          ip: "192.168.115.100"
  - hostname: "talos-cp03"
    ipAddress: "192.168.112.43"
    installDiskSelector:
      serial: "talos-cp03-disk0"
    talosImageURL: factory.talos.dev/installer/22a73b21ea2e27057f17a22b56fdf89e09868979c10d22f10a9b7e9c1e988a60
    controlPlane: true
    networkInterfaces:
      - interface: eth0
        dhcp: false
        addresses:
          - "192.168.112.43/22"
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.115.254"
        vip:
          ip: "192.168.115.100"
  - hostname: "talos-cp04"
    ipAddress: "192.168.112.44"
    installDiskSelector:
      serial: "talos-cp04-disk0"
    talosImageURL: factory.talos.dev/installer/22a73b21ea2e27057f17a22b56fdf89e09868979c10d22f10a9b7e9c1e988a60
    controlPlane: true
    networkInterfaces:
      - interface: eth0
